<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시카고 언약 장로교회 일정표</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; overflow-x: hidden; padding-bottom: 80px; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); width: 100%; }
        .weekday-header { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); text-align: center; font-weight: 900; background-color: #f1f5f9; border-bottom: 1px solid #e2e8f0; font-size: 0.75rem; }
        
        .day-cell { 
            min-height: 140px; 
            border-right: 1px solid #e2e8f0; 
            border-bottom: 1px solid #e2e8f0; 
            position: relative; 
            display: flex; 
            flex-direction: column; 
            padding: 4px; 
        }
        
        .date-number { font-size: 0.75rem; font-weight: bold; margin-bottom: 2px; display: flex; justify-content: flex-start; }

        .event-item { 
            font-size: 0.7rem; font-weight: 600; padding: 0px 2px; cursor: pointer; 
            display: block; word-break: break-all; white-space: pre-wrap; 
            line-height: 1.3; color: #334155;
        }

        .today { background-color: #f0f9ff !important; }
        
        .calendar-textarea {
            width: 100%; min-height: 120px; font-size: 0.7rem; line-height: 1.4;
            border: 2px solid #38bdf8; border-radius: 4px; padding: 4px; outline: none;
            resize: none; background-color: #fff; z-index: 10;
        }

        /* 년중 계획표 스타일 */
        #yearPlanOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 3000; display: none; overflow-y: auto; padding: 20px;
        }
        #yearPlanTable { width: 100%; border-collapse: collapse; table-layout: fixed; margin-top: 20px; border: 2px solid #1e293b; }
        #yearPlanTable th, #yearPlanTable td { border: 1px solid #cbd5e1; padding: 8px; font-size: 0.8rem; vertical-align: top; min-height: 60px; }
        #yearPlanTable th { background-color: #f8fafc; font-weight: bold; text-align: center; border-bottom: 2px solid #1e293b; }
        
        .month-col { width: 80px; text-align: center !important; vertical-align: middle !important; font-weight: 900; background-color: #f1f5f9; border-right: 2px solid #1e293b !important; }
        .regular-event-col { background-color: #f8fafc; font-weight: 900; text-align: center !important; vertical-align: middle !important; border-right: 2px solid #1e293b !important; }
        
        .week-content { font-size: 0.7rem; line-height: 1.3; color: #1e293b; white-space: pre-wrap; margin-bottom: 4px; border-bottom: 1px dashed #e2e8f0; padding-bottom: 2px; }
        
        /* 정기행사 입력 영역 */
        #reg-events-content { cursor: pointer; transition: background 0.2s; position: relative; }
        #reg-events-content:hover { background-color: #f0f9ff; }
        #reg-display-area { font-weight: 800; color: black; } /* 블랙 볼드 적용 */
        .edit-hint { font-size: 0.65rem; color: #94a3b8; display: block; margin-top: 4px; }

        @media print {
            .no-print { display: none !important; }
            #yearPlanOverlay { position: static; display: block !important; padding: 0; overflow: visible; }
            #yearPlanTable { border: 2px solid #000; width: 100%; }
            #yearPlanTable th, #yearPlanTable td { border: 1px solid #000; color: black; }
            .month-col, .regular-event-col { border-right: 2px solid #000 !important; }
        }

        #floatingControls { 
            position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); 
            background: white; padding: 12px 20px; border-radius: 16px; 
            box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); 
            display: flex; align-items: center; gap: 12px; z-index: 4000; 
            transition: bottom 0.4s; border: 1px solid #e2e8f0; 
        }
        #floatingControls.show { bottom: 30px; }
        
        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); z-index: 5000; display: none;
            justify-content: center; align-items: center; font-weight: bold; color: #0369a1;
        }
    </style>
</head>
<body class="bg-slate-50">

<div id="loadingOverlay">
    <div class="flex flex-col items-center gap-2">
        <i class="fas fa-spinner fa-spin text-3xl"></i>
        <span>데이터를 처리 중...</span>
    </div>
</div>

<!-- 년중 계획표 오버레이 -->
<div id="yearPlanOverlay">
    <div class="max-w-full mx-auto px-4">
        <div class="flex justify-between items-center mb-6 no-print">
            <h2 class="text-2xl font-black text-slate-800"><i class="fas fa-table mr-2 text-emerald-600"></i>년중 계획표 미리보기</h2>
            <div class="flex gap-3">
                <button onclick="window.print()" class="bg-emerald-600 text-white px-6 py-2 rounded-xl font-bold shadow-md hover:bg-emerald-700 transition-colors">
                    <i class="fas fa-print mr-2"></i>인쇄하기
                </button>
                <button onclick="closeYearPlan()" class="bg-slate-200 text-slate-700 px-6 py-2 rounded-xl font-bold hover:bg-slate-300 transition-colors">닫기</button>
            </div>
        </div>
        <div class="text-center mb-6">
            <h1 class="text-3xl font-black text-slate-900 border-b-4 border-slate-900 inline-block pb-1" id="overlayTitle">년중 계획표</h1>
        </div>
        <table id="yearPlanTable">
            <thead>
                <tr>
                    <th class="month-col">월 / 구분</th>
                    <th>제 1 주</th>
                    <th>제 2 주</th>
                    <th>제 3 주</th>
                    <th>제 4 주</th>
                    <th>제 5 주</th>
                </tr>
            </thead>
            <tbody id="yearPlanBody"></tbody>
            <tfoot>
                <tr id="regularEventsRow">
                    <td class="regular-event-col font-black text-slate-800 bg-slate-100">정기행사</td>
                    <td colspan="5" id="reg-events-content" onclick="editRegularEventsDirectly()">
                        <div id="reg-display-area" class="p-2 min-h-[50px] whitespace-pre-wrap"></div>
                        <span class="edit-hint no-print"><i class="fas fa-pencil-alt mr-1"></i> 이 칸을 클릭하여 직접 입력할 수 있습니다.</span>
                    </td>
                </tr>
            </tfoot>
        </table>
    </div>
</div>

<!-- 부동 컨트롤 바 -->
<div id="floatingControls" class="no-print">
    <div class="flex flex-col"><span class="text-[10px] text-slate-500 font-bold">상태</span><span id="controlStatus" class="text-xs font-bold text-sky-700">작성 중</span></div>
    <div class="h-8 w-[1px] bg-slate-200 mx-2"></div>
    <button onclick="cancelAction()" class="px-5 py-2 rounded-xl bg-slate-100 text-slate-600 font-bold text-sm">취소</button>
    <button id="confirmBtn" onclick="confirmAction()" class="px-6 py-2 rounded-xl bg-sky-600 text-white font-bold text-sm shadow-lg">저장하기</button>
</div>

<!-- 메인 뷰 -->
<div class="w-full min-h-screen flex flex-col no-print">
    <div class="px-4 mt-4">
        <div class="bg-white p-4 rounded-2xl border border-slate-200 shadow-sm flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex items-center gap-4">
                <img src="http://www.chicagocovenant.org/files/2014/10/logo.png" alt="로고" class="church-logo" onerror="this.style.display='none';">
                <h1 class="text-xl font-bold text-slate-800 whitespace-nowrap">시카고 언약 장로교회</h1>
            </div>
            
            <div class="flex items-center gap-4">
                <button onclick="changeYear(-1)" class="w-9 h-9 rounded-full bg-slate-50 border border-slate-200 text-slate-600 flex items-center justify-center hover:bg-slate-100"><i class="fas fa-angles-left"></i></button>
                <div class="font-black text-xl text-slate-800"><span id="headerYearDisplay"></span>년</div>
                <button onclick="changeYear(1)" class="w-9 h-9 rounded-full bg-slate-50 border border-slate-200 text-slate-600 flex items-center justify-center hover:bg-slate-100"><i class="fas fa-angles-right"></i></button>
            </div>

            <div class="flex items-center gap-3">
                <button onclick="showYearPlan()" class="bg-emerald-600 text-white px-5 py-2 rounded-xl font-bold text-sm shadow-sm hover:bg-emerald-700 transition-colors flex items-center gap-2">
                    <i class="fas fa-calendar-check"></i> <span>년중 계획표 보기</span>
                </button>
                <div class="flex items-center bg-slate-50 border border-slate-200 rounded-xl overflow-hidden">
                    <button onclick="changeMonth(-1)" class="px-3 py-2 hover:bg-slate-200 border-r border-slate-200"><i class="fas fa-chevron-left"></i></button>
                    <button onclick="goToToday()" class="px-4 py-2 text-xs font-bold text-slate-700 hover:bg-slate-200 min-w-[70px] text-center">
                        <span id="currentMonthLabel">오늘</span>
                    </button>
                    <button onclick="changeMonth(1)" class="px-3 py-2 hover:bg-slate-200 border-l border-slate-200"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
        </div>
    </div>

    <div class="p-4 w-full flex-grow">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
                <div class="p-4 text-center font-black text-lg bg-slate-50 border-b border-slate-200" id="monthTitle1"></div>
                <div class="weekday-header">
                    <div class="text-red-500 p-2">일</div><div class="p-2">월</div><div class="p-2">화</div><div class="p-2">수</div><div class="p-2">목</div><div class="p-2">금</div><div class="text-sky-500 p-2">토</div>
                </div>
                <div id="calendarDays1" class="calendar-grid flex-grow"></div>
            </div>
            <div class="bg-white rounded-2xl border border-slate-200 shadow-sm overflow-hidden flex flex-col">
                <div class="p-4 text-center font-black text-lg bg-slate-50 border-b border-slate-200" id="monthTitle2"></div>
                <div class="weekday-header">
                    <div class="text-red-500 p-2">일</div><div class="p-2">월</div><div class="p-2">화</div><div class="p-2">수</div><div class="p-2">목</div><div class="p-2">금</div><div class="text-sky-500 p-2">토</div>
                </div>
                <div id="calendarDays2" class="calendar-grid flex-grow"></div>
            </div>
        </div>
    </div>
</div>

<script>
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxHTlhuGvX0u2oMkOx2cciTtF14FRl-Lb2yUb-yMAajJcnonq3S1m69BRWRmAGFs9vV/exec"; 
    
    let displayDate = new Date(); 
    let workingData = {}; 
    let activeEditor = null;
    const monthNames = ["1월", "2월", "3월", "4월", "5월", "6월", "7월", "8월", "9월", "10월", "11월", "12월"];

    async function initData() {
        const currentYear = displayDate.getFullYear();
        document.getElementById('headerYearDisplay').innerText = currentYear;
        document.getElementById('currentMonthLabel').innerText = monthNames[displayDate.getMonth()];
        
        document.getElementById('loadingOverlay').style.display = 'flex';
        try {
            const fetchUrl = `${WEB_APP_URL}?action=getEvents&t=${Date.now()}`;
            const response = await fetch(fetchUrl, { method: 'GET', redirect: 'follow' });
            const result = await response.json();
            if (result.status === 'success') {
                workingData = result.data || {};
                localStorage.setItem(`church_events_${currentYear}`, JSON.stringify(workingData));
            }
        } catch (e) {
            workingData = JSON.parse(localStorage.getItem(`church_events_${currentYear}`) || '{}');
        } finally {
            document.getElementById('loadingOverlay').style.display = 'none';
            renderCalendars();
        }
    }

    async function syncData() {
        const currentYear = displayDate.getFullYear();
        localStorage.setItem(`church_events_${currentYear}`, JSON.stringify(workingData));
        
        if (!WEB_APP_URL || !WEB_APP_URL.startsWith('http')) return;

        document.getElementById('loadingOverlay').style.display = 'flex';
        try {
            await fetch(WEB_APP_URL, {
                method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'saveEvents', data: workingData })
            });
        } finally {
            setTimeout(() => { document.getElementById('loadingOverlay').style.display = 'none'; }, 500);
        }
    }

    function renderCalendars() {
        renderSingleCalendar(new Date(displayDate.getFullYear(), displayDate.getMonth(), 1), "monthTitle1", "calendarDays1");
        renderSingleCalendar(new Date(displayDate.getFullYear(), displayDate.getMonth() + 1, 1), "monthTitle2", "calendarDays2");
    }

    function renderSingleCalendar(dateObj, titleId, gridId) {
        const year = dateObj.getFullYear();
        const month = dateObj.getMonth();
        const today = new Date();
        document.getElementById(titleId).textContent = `${year}년 ${monthNames[month]}`;
        
        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();
        const gridElement = document.getElementById(gridId);
        gridElement.innerHTML = '';

        for (let i = 0; i < firstDay; i++) gridElement.innerHTML += `<div class="day-cell bg-slate-50/50"></div>`;

        for (let i = 1; i <= lastDate; i++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
            const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === i;
            const currentDayOfWeek = new Date(year, month, i).getDay();
            let dayColorClass = currentDayOfWeek === 0 ? "text-red-500" : (currentDayOfWeek === 6 ? "text-sky-500" : "text-slate-400");

            let combinedText = (workingData[dateStr] || []).map(ev => ev.text).join('\n');
            let eventsHtml = combinedText ? `<div class="event-item" onclick="editEvent(event, '${dateStr}')">${combinedText}</div>` : '';

            gridElement.innerHTML += `
                <div class="day-cell bg-white group hover:bg-slate-50 cursor-pointer ${isToday ? 'today' : ''}" onclick="showInput('${dateStr}', this)">
                    <div class="date-number">
                        <span class="${isToday ? 'bg-sky-600 text-white w-5 h-5 flex items-center justify-center rounded-full text-[10px]' : dayColorClass}">${i}</span>
                    </div>
                    <div class="input-area"></div>
                    <div class="events-container flex-grow overflow-hidden">${eventsHtml}</div>
                </div>
            `;
        }
        const totalCells = firstDay + lastDate;
        const remainCells = (7 - (totalCells % 7)) % 7;
        for (let i = 0; i < remainCells; i++) gridElement.innerHTML += `<div class="day-cell bg-slate-50/50"></div>`;
    }

    /* 정기행사 직접 입력 로직 (색상 선택 삭제) */
    function editRegularEventsDirectly() {
        if (activeEditor) return;

        const currentYear = displayDate.getFullYear();
        const container = document.getElementById('reg-events-content');
        const displayArea = document.getElementById('reg-display-area');
        
        const existingData = workingData[`REGULAR_${currentYear}`]?.[0];
        const currentText = existingData?.text || "";
        
        displayArea.style.display = 'none';
        
        const editorWrapper = document.createElement('div');
        editorWrapper.className = 'flex flex-col gap-2 w-full p-2 bg-white border-2 border-sky-400 rounded-lg shadow-sm';
        editorWrapper.onclick = e => e.stopPropagation();

        const textarea = document.createElement('textarea');
        textarea.className = 'w-full p-2 text-sm font-bold text-black focus:outline-none border-none';
        textarea.style.minHeight = "80px";
        textarea.value = currentText;
        textarea.placeholder = "정기 행사를 입력하세요 (예: 매월 첫주 제직회...)";
        
        editorWrapper.appendChild(textarea);
        container.insertBefore(editorWrapper, displayArea);
        textarea.focus();

        activeEditor = { 
            type: 'regular', 
            dateStr: `REGULAR_${currentYear}`, 
            textarea: textarea,
            wrapper: editorWrapper,
            displayArea: displayArea 
        };
        
        document.getElementById('controlStatus').innerText = "정기행사 수정 중";
        document.getElementById('floatingControls').classList.add('show');
    }

    /* 입력 UI 범용 로직 */
    function showInput(dateStr, cell) {
        if (activeEditor) return;
        const textarea = document.createElement('textarea');
        textarea.className = 'calendar-textarea';
        textarea.onclick = e => e.stopPropagation();
        cell.querySelector('.input-area').appendChild(textarea);
        textarea.focus();
        activeEditor = { type: 'new', dateStr, textarea };
        document.getElementById('floatingControls').classList.add('show');
    }

    function editEvent(e, dateStr) {
        e.stopPropagation();
        if (activeEditor) return;
        const allText = (workingData[dateStr] || []).map(ev => ev.text).join('\n');
        const cell = e.currentTarget.closest('.day-cell');
        const container = cell.querySelector('.events-container');
        container.style.display = 'none';
        const textarea = document.createElement('textarea');
        textarea.className = 'calendar-textarea';
        textarea.value = allText;
        textarea.onclick = e => e.stopPropagation();
        cell.querySelector('.input-area').appendChild(textarea);
        textarea.focus();
        activeEditor = { type: 'edit_all', dateStr, textarea, container };
        document.getElementById('controlStatus').innerText = "수정 중";
        document.getElementById('floatingControls').classList.add('show');
    }

    function confirmAction() {
        if (!activeEditor) return;
        const val = activeEditor.textarea.value.trim();
        
        if (val) {
            if (activeEditor.type === 'regular') {
                // 색상 정보 없이 저장
                workingData[activeEditor.dateStr] = [{ id: Date.now(), text: val, color: 'black' }];
            } else {
                workingData[activeEditor.dateStr] = val.split('\n').map((line, idx) => ({ id: Date.now() + idx, text: line }));
            }
        } else {
            delete workingData[activeEditor.dateStr];
        }
        
        syncData(); 
        
        if (activeEditor.type === 'regular') {
            const displayArea = document.getElementById('reg-display-area');
            displayArea.innerText = val;
            displayArea.classList.add('font-bold', 'text-black');
        }
        
        cancelAction();
    }

    function cancelAction() {
        if (activeEditor) {
            if (activeEditor.container) activeEditor.container.style.display = 'block';
            if (activeEditor.displayArea) activeEditor.displayArea.style.display = 'block';
            if (activeEditor.wrapper) activeEditor.wrapper.remove();
            else activeEditor.textarea.remove();
        }
        activeEditor = null;
        document.getElementById('controlStatus').innerText = "작성 중";
        document.getElementById('floatingControls').classList.remove('show');
        renderCalendars();
    }

    /* 년중 계획표 표시 */
    function showYearPlan() {
        const body = document.getElementById('yearPlanBody');
        body.innerHTML = '';
        const year = displayDate.getFullYear();
        document.getElementById('overlayTitle').innerText = `${year}년 년중 계획표`;

        for (let m = 0; m < 12; m++) {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td class="month-col">${m + 1}월</td>`;
            const weeks = ["", "", "", "", ""];
            const lastDay = new Date(year, m + 1, 0).getDate();
            const firstDayOfMonth = new Date(year, m, 1).getDay();

            for (let d = 1; d <= lastDay; d++) {
                const dateStr = `${year}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                let weekIdx = Math.min(4, Math.floor((d + firstDayOfMonth - 1) / 7));
                if (workingData[dateStr]) {
                    workingData[dateStr].forEach(ev => {
                        weeks[weekIdx] += `<div class="week-content">${ev.text}</div>`;
                    });
                }
            }
            weeks.forEach(w => { tr.innerHTML += `<td>${w}</td>`; });
            body.appendChild(tr);
        }

        const regDisplay = document.getElementById('reg-display-area');
        const regData = workingData[`REGULAR_${year}`]?.[0];
        const regularText = regData?.text || "";
        
        regDisplay.innerText = regularText || "이곳을 클릭하여 정기행사를 직접 입력하세요.";
        if (regularText) {
            regDisplay.style.color = "black";
            regDisplay.style.fontWeight = "800";
        } else {
            regDisplay.style.color = "#94a3b8";
            regDisplay.style.fontWeight = "400";
        }

        document.getElementById('yearPlanOverlay').style.display = 'block';
    }

    function closeYearPlan() { document.getElementById('yearPlanOverlay').style.display = 'none'; }
    function changeYear(offset) { displayDate.setFullYear(displayDate.getFullYear() + offset); initData(); }
    function changeMonth(offset) { displayDate.setMonth(displayDate.getMonth() + offset); renderCalendars(); document.getElementById('currentMonthLabel').innerText = monthNames[displayDate.getMonth()]; }
    function goToToday() { displayDate = new Date(); initData(); }
    document.addEventListener('DOMContentLoaded', initData);
</script>
</body>
</html>
