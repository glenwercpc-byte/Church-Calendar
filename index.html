<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>시카고 언약 장로교회 일정표</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700;900&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f8fafc; margin: 0; padding: 0; overflow-x: hidden; padding-bottom: 80px; }
        
        .calendar-grid { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); width: 100%; }
        .weekday-header { display: grid; grid-template-columns: repeat(7, minmax(0, 1fr)); text-align: center; font-weight: 900; background-color: #f1f5f9; border-bottom: 1px solid #e2e8f0; font-size: 0.75rem; }
        .day-cell { min-height: 140px; border-right: 1px solid #e2e8f0; border-bottom: 1px solid #e2e8f0; position: relative; display: flex; flex-direction: column; padding-bottom: 8px; }
        
        .event-item { 
            font-size: 0.7rem; 
            font-weight: 600; 
            padding: 2px 4px; 
            cursor: pointer; 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
            margin-bottom: 4px;
            word-break: break-all; 
            white-space: normal; 
            position: relative;
        }
        .event-text { flex: 1; line-height: 1.3; }
        .today { background-color: #f0f9ff !important; }
        
        /* 삭제 확인 팝업 스타일 수정: 아이콘 상단에 배치 */
        .delete-confirm-pop {
            position: absolute;
            right: 0;
            bottom: 100%; /* 부모(버튼 컨테이너)의 위쪽으로 배치 */
            margin-bottom: 5px; /* 약간의 간격 */
            background: white;
            border: 1px solid #fca5a5;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            border-radius: 6px;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 2px 6px;
            z-index: 50;
            animation: fadeIn 0.2s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(5px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .calendar-textarea {
            width: 100%;
            min-height: 100px; 
            font-size: 0.75rem;
            line-height: 1.4;
            border: 2px solid #38bdf8;
            border-radius: 8px;
            padding: 8px;
            outline: none;
            resize: none;
            overflow: hidden; 
            background-color: #fff;
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1);
            z-index: 10;
        }

        /* 줄별 색상 팝업 */
        #colorPopup {
            display: none;
            position: absolute;
            z-index: 3000;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.15);
            padding: 6px 10px;
            align-items: center;
            gap: 6px;
            white-space: nowrap;
        }
        #colorPopup.visible { display: flex; }
        #colorPopup span {
            font-size: 0.65rem;
            font-weight: 700;
            color: #64748b;
            margin-right: 2px;
        }
        .cp-btn {
            width: 20px; height: 20px;
            border-radius: 50%;
            border: 2px solid transparent;
            cursor: pointer;
            transition: transform 0.12s, border-color 0.12s;
            flex-shrink: 0;
        }
        .cp-btn:hover { transform: scale(1.15); }
        .cp-btn.selected { border-color: #0284c7; transform: scale(1.2); }
        .cp-black { background: #1e293b; }
        .cp-red   { background: #dc2626; }
        .cp-blue  { background: #2563eb; }
        /* 현재 편집 줄 하이라이트 */
        .line-highlight { background: #f0f9ff !important; }

        #yearPlanOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: white; z-index: 3000; display: none; overflow-y: auto;
            padding: 20px;
        }
        #yearPlanTable { width: 100%; border-collapse: collapse; table-layout: fixed; margin-top: 20px; }
        #yearPlanTable th, #yearPlanTable td { border: 1px solid #cbd5e1; padding: 10px; font-size: 0.85rem; vertical-align: top; }
        #yearPlanTable th { background-color: #f8fafc; font-weight: bold; text-align: center; }
        .month-col { width: 60px; text-align: center !important; vertical-align: middle !important; font-weight: 900; background-color: #f1f5f9; }
        .week-content { font-size: 0.7rem; line-height: 1.4; color: #334155; }

        @media print {
            .no-print { display: none !important; }
            #yearPlanOverlay { position: static; display: block !important; padding: 0; overflow: visible; }
            #yearPlanTable { border: 2px solid #000; }
            #yearPlanTable th, #yearPlanTable td { border: 1px solid #000; color: black; }
        }

        #floatingControls { position: fixed; bottom: -100px; left: 50%; transform: translateX(-50%); background: white; padding: 12px 20px; border-radius: 16px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.2); display: flex; align-items: center; gap: 12px; z-index: 2000; transition: bottom 0.4s; border: 1px solid #e2e8f0; }
        #floatingControls.show { bottom: 30px; }
        .church-logo { height: 40px; }
        
        #loadingOverlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(255,255,255,0.8); z-index: 5000; display: flex;
            justify-content: center; align-items: center; font-weight: bold;
            color: #0369a1;
        }

        /* 경고 메시지 스타일 */
        #urlWarning {
            display: none;
            position: fixed; top: 10px; left: 50%; transform: translateX(-50%);
            background: #fee2e2; color: #b91c1c; padding: 10px 20px;
            border-radius: 8px; border: 1px solid #fca5a5; z-index: 6000;
            font-size: 13px; font-weight: bold; text-align: center;
        }
    </style>
</head>
<body class="bg-slate-50" onclick="closeAllDeletePopups()">

<!-- 줄별 색상 선택 팝업 -->
<div id="colorPopup">
    <span>색상</span>
    <button class="cp-btn cp-black selected" data-color="black" title="검정" onclick="selectLineColor('black', event)"></button>
    <button class="cp-btn cp-red"   data-color="red"   title="빨강" onclick="selectLineColor('red', event)"></button>
    <button class="cp-btn cp-blue"  data-color="blue"  title="파랑" onclick="selectLineColor('blue', event)"></button>
</div>

<div id="urlWarning">
    <i class="fas fa-exclamation-triangle mr-1"></i> WEB_APP_URL이 설정되지 않았습니다. 코드를 확인해 주세요.
</div>

<div id="loadingOverlay">
    <div class="flex flex-col items-center gap-2">
        <i class="fas fa-spinner fa-spin text-3xl"></i>
        <span id="loadingText">데이터를 동기화 중...</span>
    </div>
</div>

<div id="yearPlanOverlay">
    <div class="max-w-6xl mx-auto">
        <div class="flex justify-between items-center mb-6 no-print">
            <h2 class="text-2xl font-black text-slate-800"><i class="fas fa-table mr-2 text-emerald-600"></i>년중 계획표 미리보기</h2>
            <div class="flex gap-3">
                <button onclick="window.print()" class="bg-emerald-600 text-white px-6 py-2 rounded-xl font-bold shadow-md hover:bg-emerald-700 transition-colors">
                    <i class="fas fa-print mr-2"></i>인쇄하기
                </button>
                <button onclick="exportToGoogleSheet()" id="exportSheetBtn" class="bg-blue-500 text-white px-6 py-2 rounded-xl font-bold shadow-md hover:bg-blue-600 transition-colors flex items-center gap-2">
                    <i class="fab fa-google-drive"></i>구글 시트로 내보내기
                </button>
                <button onclick="closeYearPlan()" class="bg-slate-200 text-slate-700 px-6 py-2 rounded-xl font-bold hover:bg-slate-300 transition-colors">닫기</button>
            </div>
        </div>
        <div class="text-center mb-6">
            <h1 class="text-3xl font-black text-slate-900 border-b-4 border-slate-900 inline-block pb-1" id="overlayTitle">년중 계획표</h1>
        </div>
        <table id="yearPlanTable">
            <thead>
                <tr><th class="month-col">월</th><th>제1주</th><th>제2주</th><th>제3주</th><th>제4주</th><th>제5주</th></tr>
            </thead>
            <tbody id="yearPlanBody"></tbody>
        </table>
    </div>
</div>

<div id="floatingControls" class="no-print">
    <div class="flex flex-col"><span class="text-[10px] text-slate-500 font-bold">상태</span><span id="controlStatus" class="text-xs font-bold text-sky-700">작성 중</span></div>
    <div class="h-8 w-[1px] bg-slate-200 mx-2"></div>
    <button onclick="cancelAction()" class="px-5 py-2 rounded-xl bg-slate-100 text-slate-600 font-bold text-sm">취소</button>
    <button id="confirmBtn" onclick="confirmAction()" class="px-6 py-2 rounded-xl bg-sky-600 text-white font-bold text-sm shadow-lg">저장하기</button>
</div>

<div class="w-full min-h-screen flex flex-col no-print">
    <div class="px-2 md:px-4 mt-2 md:mt-4">
        <div class="bg-sky-100 p-2.5 md:p-4 rounded-xl border border-sky-200 flex flex-col md:flex-row justify-between items-center gap-4">
            <div class="flex-1 flex items-center gap-4 w-full">
                <img src="http://www.chicagocovenant.org/files/2014/10/logo.png" alt="로고" class="church-logo" onerror="this.style.display='none';">
                <h1 class="text-xl font-bold text-sky-900 whitespace-nowrap">시카고 언약 장로교회</h1>
            </div>
            
            <div class="flex-1 flex justify-center items-center gap-4">
                <button onclick="changeYear(-1)" class="w-10 h-10 rounded-full bg-white border border-sky-300 text-sky-700 flex items-center justify-center shadow-sm"><i class="fas fa-angles-left"></i></button>
                <div class="bg-white px-8 py-2 rounded-full font-black text-xl border border-sky-300 text-sky-800 shadow-sm"><span id="headerYearDisplay"></span>년 일정표</div>
                <button onclick="changeYear(1)" class="w-10 h-10 rounded-full bg-white border border-sky-300 text-sky-700 flex items-center justify-center shadow-sm"><i class="fas fa-angles-right"></i></button>
            </div>

            <div class="flex-1 flex justify-end items-center gap-3">
                <button onclick="showYearPlan()" class="bg-emerald-600 text-white px-5 py-2.5 rounded-xl font-bold text-sm shadow-md flex items-center gap-2"><i class="fas fa-eye"></i> <span>년중 계획표</span></button>
                <button onclick="openMonthPicker()" class="flex items-center gap-2 bg-white border border-sky-200 rounded-xl shadow-sm px-5 py-2 text-sm font-bold text-sky-700 hover:bg-sky-50 transition-colors">
                    <i class="fas fa-calendar-days"></i>
                    <span id="currentMonthLabel">월 선택</span>
                </button>
            </div>
        </div>
    </div>

    <div class="p-2 md:p-4 w-full flex-grow">
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
            <div class="calendar-container bg-white rounded-xl border shadow-sm overflow-hidden">
                <div class="flex items-center justify-between bg-slate-50 border-b px-3 py-4">
                    <button onclick="changeMonth(-1)" class="w-9 h-9 rounded-full bg-white border border-sky-300 text-sky-700 flex items-center justify-center shadow-sm hover:bg-sky-50 transition-colors" title="이전 달">
                        <i class="fas fa-chevron-left text-sm"></i>
                    </button>
                    <div class="font-black text-lg" id="monthTitle1"></div>
                    <div class="w-9"></div>
                </div>
                <div class="weekday-header">
                    <div class="text-red-600 p-2">일요일</div>
                    <div class="p-2">월요일</div>
                    <div class="p-2">화요일</div>
                    <div class="p-2">수요일</div>
                    <div class="p-2">목요일</div>
                    <div class="p-2">금요일</div>
                    <div class="text-sky-600 p-2">토요일</div>
                </div>
                <div id="calendarDays1" class="calendar-grid"></div>
            </div>
            <div class="calendar-container bg-white rounded-xl border shadow-sm overflow-hidden">
                <div class="flex items-center justify-between bg-slate-50 border-b px-3 py-4">
                    <div class="w-9"></div>
                    <div class="font-black text-lg" id="monthTitle2"></div>
                    <button onclick="changeMonth(1)" class="w-9 h-9 rounded-full bg-white border border-sky-300 text-sky-700 flex items-center justify-center shadow-sm hover:bg-sky-50 transition-colors" title="다음 달">
                        <i class="fas fa-chevron-right text-sm"></i>
                    </button>
                </div>
                <div class="weekday-header">
                    <div class="text-red-600 p-2">일요일</div>
                    <div class="p-2">월요일</div>
                    <div class="p-2">화요일</div>
                    <div class="p-2">수요일</div>
                    <div class="p-2">목요일</div>
                    <div class="p-2">금요일</div>
                    <div class="text-sky-600 p-2">토요일</div>
                </div>
                <div id="calendarDays2" class="calendar-grid"></div>
            </div>
        </div>
    </div>
</div>

<script>
    /**
     * [중요] 구글 앱스크립트 배포 후 생성된 '웹 앱 URL'을 아래 큰따옴표 안에 입력해야 합니다.
     */
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbyBBI8GtTCh0bYU_AvA7tjQTtEDOPwDTsDgFYw5RgvKdhw6vAXwY7h4rJgcFm-QrNII/exec"; 
    
    let displayDate = new Date(); 
    let workingData = {}; 
    let activeEditor = null;
    const monthNames = ["1월", "2월", "3월", "4월", "5월", "6월", "7월", "8월", "9월", "10월", "11월", "12월"];

    async function initData() {
        const currentYear = displayDate.getFullYear();
        document.getElementById('headerYearDisplay').innerText = currentYear;
        document.getElementById('currentMonthLabel').innerText = monthNames[displayDate.getMonth()];
        
        if (!WEB_APP_URL || !WEB_APP_URL.startsWith('http')) {
            console.error("WEB_APP_URL이 올바르지 않습니다.");
            document.getElementById('urlWarning').style.display = 'block';
            document.getElementById('loadingOverlay').style.display = 'none';
            const local = localStorage.getItem(`church_events_${currentYear}`);
            workingData = local ? JSON.parse(local) : {};
            renderCalendars();
            return;
        }

        document.getElementById('urlWarning').style.display = 'none';
        document.getElementById('loadingOverlay').style.display = 'flex';
        
        try {
            const fetchUrl = `${WEB_APP_URL}?action=getEvents&t=${Date.now()}`;
            const response = await fetch(fetchUrl, { method: 'GET', redirect: 'follow' });
            if (!response.ok) throw new Error(`HTTP error! status: ${response.status}`);
            const result = await response.json();
            if (result.status === 'success') {
                workingData = result.data || {};
                localStorage.setItem(`church_events_${currentYear}`, JSON.stringify(workingData));
            }
            renderCalendars();
        } catch (e) {
            console.error("데이터 로드 실패:", e);
            const local = localStorage.getItem(`church_events_${currentYear}`);
            workingData = local ? JSON.parse(local) : {};
            renderCalendars();
        } finally {
            document.getElementById('loadingOverlay').style.display = 'none';
        }
    }

    async function syncData() {
        if (!WEB_APP_URL || !WEB_APP_URL.startsWith('http')) {
            localStorage.setItem(`church_events_${displayDate.getFullYear()}`, JSON.stringify(workingData));
            return;
        }

        document.getElementById('loadingOverlay').style.display = 'flex';
        try {
            await fetch(WEB_APP_URL, {
                method: 'POST',
                mode: 'no-cors',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ action: 'saveEvents', data: workingData })
            });
            localStorage.setItem(`church_events_${displayDate.getFullYear()}`, JSON.stringify(workingData));
        } catch (e) {
            console.error("저장 실패:", e);
        } finally {
            setTimeout(() => { document.getElementById('loadingOverlay').style.display = 'none'; }, 500);
        }
    }

    function renderCalendars() {
        const firstMonth = new Date(displayDate.getFullYear(), displayDate.getMonth(), 1);
        renderSingleCalendar(firstMonth, "monthTitle1", "calendarDays1");
        
        const secondMonth = new Date(displayDate.getFullYear(), displayDate.getMonth() + 1, 1);
        renderSingleCalendar(secondMonth, "monthTitle2", "calendarDays2");
    }

    function renderSingleCalendar(dateObj, titleId, gridId) {
        const year = dateObj.getFullYear();
        const month = dateObj.getMonth();
        const today = new Date();
        document.getElementById(titleId).textContent = `${year}년 ${monthNames[month]}`;
        
        const firstDay = new Date(year, month, 1).getDay();
        const lastDate = new Date(year, month + 1, 0).getDate();
        const gridElement = document.getElementById(gridId);
        gridElement.innerHTML = '';

        for (let i = 0; i < firstDay; i++) {
            gridElement.innerHTML += `<div class="day-cell bg-slate-50/50 border-r border-b border-slate-200"></div>`;
        }

        for (let i = 1; i <= lastDate; i++) {
            const dateStr = `${year}-${String(month + 1).padStart(2, '0')}-${String(i).padStart(2, '0')}`;
            const isToday = today.getFullYear() === year && today.getMonth() === month && today.getDate() === i;
            
            const currentDayOfWeek = new Date(year, month, i).getDay();
            let dayColorClass = "text-slate-500";
            if (currentDayOfWeek === 0) dayColorClass = "text-red-600";
            if (currentDayOfWeek === 6) dayColorClass = "text-sky-600";

            let eventsHtml = (workingData[dateStr] || []).map(event => {
                const colorStyle =
                    event.color === 'red'  ? 'color:#dc2626; font-weight:700;' :
                    event.color === 'blue' ? 'color:#2563eb; font-weight:700;' :
                                            'color:#1e293b;';
                return `
                <div class="event-item group" style="${colorStyle}" onclick="editEvent(event, '${dateStr}', ${event.id})">
                    <span class="event-text">${event.text}</span>
                    <div class="relative delete-container">
                        <button class="ml-1 text-[10px] text-red-400 opacity-0 group-hover:opacity-100 p-1" onclick="askDelete(event, '${dateStr}', ${event.id})">
                            <i class="fas fa-times"></i>
                        </button>
                    </div>
                </div>`;
            }).join('');

            gridElement.innerHTML += `
                <div class="day-cell group bg-white p-2 hover:bg-slate-50 cursor-pointer ${isToday ? 'today' : ''}" onclick="showInput('${dateStr}', this)">
                    <div class="text-xs font-bold mb-1"><span class="${isToday ? 'bg-sky-600 text-white px-1.5 py-0.5 rounded-full' : dayColorClass}">${i}</span></div>
                    <div class="input-area"></div>
                    <div class="events-container overflow-y-auto max-h-[120px]">${eventsHtml}</div>
                </div>
            `;
        }
        
        const totalCells = firstDay + lastDate;
        const remainCells = (7 - (totalCells % 7)) % 7;
        for (let i = 0; i < remainCells; i++) {
            gridElement.innerHTML += `<div class="day-cell bg-slate-50/50 border-r border-b border-slate-200"></div>`;
        }
    }

    // 삭제 확인 팝업 표시 (위치: 아이콘 상단)
    function askDelete(e, dateStr, eventId) {
        e.stopPropagation();
        closeAllDeletePopups(); 
        
        const container = e.currentTarget.parentElement;
        const pop = document.createElement('div');
        pop.className = 'delete-confirm-pop';
        pop.onclick = (ev) => ev.stopPropagation(); 
        
        pop.innerHTML = `
            <span class="text-[9px] font-bold text-red-600 whitespace-nowrap">삭제?</span>
            <button class="bg-red-500 text-white px-1.5 py-0.5 rounded text-[9px] font-bold" onclick="executeDelete(event, '${dateStr}', ${eventId})">확인</button>
            <button class="bg-slate-200 text-slate-600 px-1.5 py-0.5 rounded text-[9px] font-bold" onclick="closeAllDeletePopups()">X</button>
        `;
        
        container.appendChild(pop);
    }

    function closeAllDeletePopups() {
        const pops = document.querySelectorAll('.delete-confirm-pop');
        pops.forEach(p => p.remove());
    }

    function executeDelete(e, dateStr, eventId) {
        e.stopPropagation();
        workingData[dateStr] = workingData[dateStr].filter(ev => ev.id !== eventId);
        if (workingData[dateStr].length === 0) delete workingData[dateStr];
        syncData(); 
        renderCalendars();
    }

    function showInput(dateStr, cell) {
        if (activeEditor) return;
        closeAllDeletePopups();

        const textarea = document.createElement('textarea');
        textarea.className = 'calendar-textarea';
        textarea.placeholder = '일정을 입력하세요...';
        textarea.onclick = e => e.stopPropagation();
        textarea.oninput = function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
            syncLineColors(this);
        };
        textarea.addEventListener('keydown', onTextareaKeydown);
        textarea.addEventListener('click',   onTextareaFocus);
        textarea.addEventListener('focus',   onTextareaFocus);
        textarea.addEventListener('keyup',   onTextareaFocus);

        cell.querySelector('.input-area').appendChild(textarea);
        textarea.focus();
        activeEditor = { type: 'new', dateStr, textarea, lineColors: ['black'] };
        showColorPopup(textarea, 0);
        document.getElementById('floatingControls').classList.add('show');
    }

    function editEvent(e, dateStr, eventId) {
        e.stopPropagation();
        if (activeEditor) return;
        closeAllDeletePopups();

        const existingEvents = workingData[dateStr] || [];
        const allText = existingEvents.map(ev => ev.text.replace(/^•\s?/, '')).join('\n');
        const lineColors = existingEvents.map(ev => ev.color || 'black');

        const cell = e.currentTarget.closest('.day-cell');
        const container = cell.querySelector('.events-container');
        container.style.display = 'none';

        const textarea = document.createElement('textarea');
        textarea.className = 'calendar-textarea';
        textarea.value = allText;
        textarea.onclick = e => e.stopPropagation();
        textarea.oninput = function() {
            this.style.height = 'auto';
            this.style.height = this.scrollHeight + 'px';
            syncLineColors(this);
        };
        textarea.addEventListener('keydown', onTextareaKeydown);
        textarea.addEventListener('click',   onTextareaFocus);
        textarea.addEventListener('focus',   onTextareaFocus);
        textarea.addEventListener('keyup',   onTextareaFocus);

        cell.querySelector('.input-area').appendChild(textarea);
        textarea.style.height = 'auto';
        textarea.style.height = textarea.scrollHeight + 'px';
        textarea.focus();

        activeEditor = { type: 'edit_all', dateStr, textarea, container, lineColors };
        showColorPopup(textarea, 0);
        document.getElementById('controlStatus').innerText = "수정 중";
        document.getElementById('floatingControls').classList.add('show');
    }

    function confirmAction() {
        if (!activeEditor) return;
        const val = activeEditor.textarea.value.trim();
        hideColorPopup();

        if (val) {
            const lines = val.split('\n').filter(l => l.trim() !== '');
            const colors = activeEditor.lineColors || [];
            workingData[activeEditor.dateStr] = lines.map((line, idx) => {
                let text = line.trim();
                if (!text.startsWith('•')) text = '• ' + text;
                else if (!text.startsWith('• ')) text = '• ' + text.substring(1).trim();
                return { id: Date.now() + idx, text, color: colors[idx] || 'black' };
            });
        } else {
            delete workingData[activeEditor.dateStr];
        }
        syncData();
        cancelAction();
    }

    function cancelAction() {
        hideColorPopup();
        if (activeEditor) {
            if (activeEditor.container) activeEditor.container.style.display = 'block';
            if (activeEditor.textarea) activeEditor.textarea.remove();
        }
        activeEditor = null;
        document.getElementById('controlStatus').innerText = "작성 중";
        document.getElementById('floatingControls').classList.remove('show');
        renderCalendars();
    }

    /* ── 색상 팝업 & 줄별 색상 관리 ─────────────────────────── */

    // textarea 내 현재 커서가 몇 번째 줄(0-based)에 있는지 반환
    function getCurrentLineIndex(textarea) {
        const text = textarea.value.substring(0, textarea.selectionStart);
        return text.split('\n').length - 1;
    }

    // 팝업을 textarea 바로 위(day-cell 기준)에 배치
    function showColorPopup(textarea, lineIdx) {
        if (!activeEditor) return;
        const popup = document.getElementById('colorPopup');
        const cell = textarea.closest('.day-cell');
        if (!cell) return;

        // cell 위치 기준으로 팝업 절대 위치 계산
        const cellRect = cell.getBoundingClientRect();
        const scrollY = window.scrollY || window.pageYOffset;
        const scrollX = window.scrollX || window.pageXOffset;

        popup.style.top  = (cellRect.top + scrollY - popup.offsetHeight - 6) + 'px';
        popup.style.left = (cellRect.left + scrollX) + 'px';

        // 현재 줄 색상으로 버튼 상태 동기화
        const currentColor = (activeEditor.lineColors && activeEditor.lineColors[lineIdx]) || 'black';
        popup.querySelectorAll('.cp-btn').forEach(btn => {
            btn.classList.toggle('selected', btn.dataset.color === currentColor);
        });

        popup.classList.add('visible');

        // 팝업이 viewport 위로 넘치면 textarea 아래로
        const popRect = popup.getBoundingClientRect();
        if (popRect.top < 0) {
            popup.style.top = (cellRect.bottom + scrollY + 4) + 'px';
        }
    }

    function hideColorPopup() {
        document.getElementById('colorPopup').classList.remove('visible');
    }

    // 색상 버튼 클릭 → 현재 줄 색상 갱신
    function selectLineColor(color, e) {
        if (e) e.stopPropagation();
        if (!activeEditor) return;
        const textarea = activeEditor.textarea;
        const lineIdx = getCurrentLineIndex(textarea);

        // lineColors 배열 크기를 현재 줄 수에 맞게 확장
        const lineCount = textarea.value.split('\n').length;
        while (activeEditor.lineColors.length < lineCount) {
            activeEditor.lineColors.push('black');
        }
        activeEditor.lineColors[lineIdx] = color;

        // 팝업 버튼 상태 갱신
        document.querySelectorAll('#colorPopup .cp-btn').forEach(btn => {
            btn.classList.toggle('selected', btn.dataset.color === color);
        });

        textarea.focus();
    }

    // textarea 포커스/클릭/커서 이동 시 팝업 위치·색상 갱신
    function onTextareaFocus(e) {
        if (!activeEditor) return;
        const textarea = activeEditor.textarea;
        const lineIdx = getCurrentLineIndex(textarea);
        showColorPopup(textarea, lineIdx);
    }

    // Enter 키: 새 줄 색상을 기본값(black)으로 삽입
    function onTextareaKeydown(e) {
        if (!activeEditor) return;
        if (e.key === 'Enter') {
            const textarea = activeEditor.textarea;
            const lineIdx = getCurrentLineIndex(textarea);
            // 현재 줄 다음에 'black' 삽입
            activeEditor.lineColors.splice(lineIdx + 1, 0, 'black');
            // 다음 틱에 팝업 갱신 (커서가 이동한 후)
            setTimeout(() => {
                const newLineIdx = getCurrentLineIndex(textarea);
                showColorPopup(textarea, newLineIdx);
            }, 0);
        }
        // Backspace로 줄 삭제 시 색상 배열도 정리
        if (e.key === 'Backspace') {
            const textarea = activeEditor.textarea;
            const pos = textarea.selectionStart;
            const textBefore = textarea.value.substring(0, pos);
            // 줄 맨 앞에서 Backspace → 이전 줄과 합쳐짐
            if (textBefore.endsWith('\n') || (pos > 0 && textarea.value[pos - 1] === '\n')) {
                const lineIdx = getCurrentLineIndex(textarea);
                if (lineIdx > 0) activeEditor.lineColors.splice(lineIdx, 1);
                setTimeout(() => {
                    syncLineColors(textarea);
                    const newLineIdx = getCurrentLineIndex(textarea);
                    showColorPopup(textarea, newLineIdx);
                }, 0);
            }
        }
    }

    // 줄 수가 바뀌었을 때 lineColors 배열 길이를 맞춤
    function syncLineColors(textarea) {
        if (!activeEditor) return;
        const lineCount = textarea.value.split('\n').length;
        while (activeEditor.lineColors.length < lineCount) activeEditor.lineColors.push('black');
        if (activeEditor.lineColors.length > lineCount) activeEditor.lineColors.length = lineCount;
    }

    function changeYear(offset) { displayDate.setFullYear(displayDate.getFullYear() + offset); initData(); }
    function changeMonth(offset) { displayDate.setMonth(displayDate.getMonth() + offset); initData(); }
    
    function showYearPlan() {
        const body = document.getElementById('yearPlanBody');
        body.innerHTML = '';
        const year = displayDate.getFullYear();
        document.getElementById('overlayTitle').innerText = `${year}년 년중 계획표`;

        // 연속 중복 체크: 텍스트별로 마지막 출력된 날짜를 기억
        const lastSeenDate = {};

        for (let m = 0; m < 12; m++) {
            const tr = document.createElement('tr');
            tr.innerHTML = `<td class="month-col">${m + 1}월</td>`;
            const weeks = ["", "", "", "", ""];
            const lastDay = new Date(year, m + 1, 0).getDate();

            for (let d = 1; d <= lastDay; d++) {
                const dateStr = `${year}-${String(m + 1).padStart(2, '0')}-${String(d).padStart(2, '0')}`;
                const firstDayOfMonth = new Date(year, m, 1).getDay();
                let weekIdx = Math.floor((d + firstDayOfMonth - 1) / 7);
                if (weekIdx > 4) weekIdx = 4;

                if (workingData[dateStr]) {
                    workingData[dateStr].forEach(ev => {
                        const text = ev.text.startsWith('•') ? ev.text : `• ${ev.text}`;
                        const colorStyle =
                            ev.color === 'red'  ? 'color:#dc2626; font-weight:700;' :
                            ev.color === 'blue' ? 'color:#2563eb; font-weight:700;' : '';

                        // 바로 전날에 동일 텍스트가 출력됐으면 스킵 (연속 중복)
                        const mm = String(m + 1).padStart(2, '0');
                        const prevDateStr = d > 1
                            ? `${year}-${mm}-${String(d - 1).padStart(2, '0')}`
                            : null;

                        const isDuplicate = prevDateStr !== null && lastSeenDate[text] === prevDateStr;
                        if (!isDuplicate) {
                            weeks[weekIdx] += `<div class="week-content" style="${colorStyle}">${text}</div>`;
                        }
                        lastSeenDate[text] = dateStr;
                    });
                }
            }
            weeks.forEach(w => { tr.innerHTML += `<td>${w}</td>`; });
            body.appendChild(tr);
        }
        // 추가사항 행
        const extraTr = document.createElement('tr');
        extraTr.innerHTML = `
            <td class="month-col" style="font-weight:900; background:#f1f5f9;">추가사항</td>
            <td></td>
            <td></td>
            <td class="week-content" style="vertical-align:top; padding:6px; font-size:0.75rem; line-height:1.6;">
                <div>* 샘터모임 1,2째주 모임 권고</div>
                <div>* 제직부서장회의 - 격월 짝수달 3째주 금요일 실시</div>
            </td>
            <td class="week-content" style="vertical-align:top; padding:6px; font-size:0.75rem; line-height:1.6;">
                <div>* 청지기 교육 - 매월 4째주일</div>
                <div>* 팀장회의 - 매월 첫째 금요일</div>
                <div>* 정기 당회 - 매월 둘째주 토요일</div>
            </td>
            <td class="week-content" style="vertical-align:top; padding:6px; font-size:0.75rem; line-height:1.6;">
                <div>* 새벽예배 없는 날</div>
                <div style="padding-left:8px;">1) 매주 월요일과 주일</div>
                <div style="padding-left:8px;">2) Thanksgiving Day</div>
                <div style="padding-left:8px;">3) Christmas Day</div>
                <div style="margin-top:6px;">* 금요 기도회 없는 날</div>
                <div style="padding-left:8px;">1) Thanksgiving Friday</div>
                <div style="padding-left:8px;">2) Christmas Day</div>
            </td>
        `;
        body.appendChild(extraTr);

        document.getElementById('yearPlanOverlay').style.display = 'block';
    }
    

    async function exportToGoogleSheet() {
        const btn = document.getElementById('exportSheetBtn');
        const year = displayDate.getFullYear();

        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> 생성 중...';

        try {
            // Apps Script 웹앱은 리다이렉트를 거치므로 직접 URL을 만들어 호출
            // no-cors 대신 jsonp 방식으로 처리 (콜백 함수 활용)
            const sheetUrl = await new Promise((resolve, reject) => {
                const callbackName = '_gsCallback_' + Date.now();
                const script = document.createElement('script');
                const timeout = setTimeout(() => {
                    delete window[callbackName];
                    script.remove();
                    reject(new Error('요청 시간 초과'));
                }, 30000);

                window[callbackName] = (result) => {
                    clearTimeout(timeout);
                    delete window[callbackName];
                    script.remove();
                    if (result.status === 'success') {
                        resolve(result.url);
                    } else {
                        reject(new Error(result.message || '생성 실패'));
                    }
                };

                script.src = `${WEB_APP_URL}?action=createYearPlanSheet&year=${year}&callback=${callbackName}&t=${Date.now()}`;
                script.onerror = () => {
                    clearTimeout(timeout);
                    delete window[callbackName];
                    reject(new Error('스크립트 로드 실패'));
                };
                document.head.appendChild(script);
            });

            window.open(sheetUrl, '_blank');

        } catch (e) {
            alert('오류가 발생했습니다: ' + e.message);
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fab fa-google-drive"></i> 구글 시트로 내보내기';
        }
    }
    function closeYearPlan() { document.getElementById('yearPlanOverlay').style.display = 'none'; }
    function goToToday() { displayDate = new Date(); initData(); }

    function openMonthPicker() {
        const grid = document.getElementById('monthPickerGrid');
        const currentMonth = displayDate.getMonth();
        grid.innerHTML = '';
        for (let i = 0; i < 12; i++) {
            const isActive = i === currentMonth;
            const btn = document.createElement('button');
            btn.textContent = (i + 1) + '월';
            btn.style.cssText = `
                padding: 10px 0;
                border-radius: 10px;
                font-size: 0.9rem;
                font-weight: 700;
                cursor: pointer;
                border: 2px solid ${isActive ? '#0284c7' : '#e2e8f0'};
                background: ${isActive ? '#0284c7' : 'white'};
                color: ${isActive ? 'white' : '#334155'};
                transition: all 0.15s;
            `;
            btn.onmouseover = () => { if (!isActive) { btn.style.background = '#f0f9ff'; btn.style.borderColor = '#7dd3fc'; } };
            btn.onmouseout  = () => { if (!isActive) { btn.style.background = 'white'; btn.style.borderColor = '#e2e8f0'; } };
            btn.onclick = () => {
                displayDate.setMonth(i);
                document.getElementById('currentMonthLabel').innerText = monthNames[i];
                closeMonthPicker();
                initData();
            };
            grid.appendChild(btn);
        }
        const overlay = document.getElementById('monthPickerOverlay');
        overlay.style.display = 'flex';
    }

    function closeMonthPicker() {
        document.getElementById('monthPickerOverlay').style.display = 'none';
    }
    document.addEventListener('DOMContentLoaded', initData);
</script>

<!-- 월 선택 모달 -->
<div id="monthPickerOverlay" onclick="closeMonthPicker()" style="display:none; position:fixed; inset:0; background:rgba(0,0,0,0.4); z-index:7000; justify-content:center; align-items:center;">
    <div onclick="event.stopPropagation()" style="background:white; border-radius:20px; padding:28px; width:320px; box-shadow:0 25px 50px -12px rgba(0,0,0,0.3);">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;">
            <span style="font-size:1.1rem; font-weight:900; color:#0c4a6e;">월 선택</span>
            <button onclick="closeMonthPicker()" style="color:#94a3b8; font-size:1.2rem; background:none; border:none; cursor:pointer;"><i class="fas fa-times"></i></button>
        </div>
        <div style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px;" id="monthPickerGrid"></div>
    </div>
</div>
